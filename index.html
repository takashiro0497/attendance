<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出席登録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:440px;padding:1.5rem 1rem}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;border:0.5px solid #e5e5e0}
label{font-size:13px;color:#666;display:block;margin-bottom:5px}
input[type=text]{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:16px;color:#1a1a1a;background:#fff}
input:focus{outline:none;border-color:#1a1a1a}
input:disabled{background:#f9f9f9;color:#999}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;cursor:pointer;font-size:15px;font-weight:500;margin-top:.75rem}
button:active{opacity:.75}
.status{padding:16px;border-radius:8px;font-size:15px;font-weight:500;margin-top:1rem;text-align:center;line-height:1.5}
.s-present{background:#EAF3DE;color:#3B6D11}
.s-late{background:#FAEEDA;color:#854F0B}
.s-absent{background:#FCEBEB;color:#A32D2D}
.s-dup{background:#EEEDFE;color:#534AB7}
.s-info{background:#f5f5f0;color:#666}
.class-label{font-size:13px;color:#888;margin-bottom:4px}
.class-name{font-size:20px;font-weight:500;margin-bottom:4px}
.class-time{font-size:13px;color:#888}
.foot{font-size:12px;color:#bbb;text-align:center;margin-top:.75rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="class-card">
    <div class="class-label">授業</div>
    <div class="class-name" id="disp-name">—</div>
    <div class="class-time" id="disp-time">QRコードを読み込んでアクセスしてください</div>
  </div>
  <div class="card">
    <label>学籍番号</label>
    <input type="text" id="student-id" placeholder="例: 2024001" maxlength="20" inputmode="numeric">
    <button onclick="submit()">出席を登録する</button>
    <div id="status" class="status s-info" style="display:none"></div>
  </div>
  <div class="foot">1端末につき1回のみ登録可能</div>
</div>

<script>
const RK='att_rec', DK='att_dev';
const getRec=()=>{try{return JSON.parse(localStorage.getItem(RK)||'[]')}catch{return[]}};
const saveRec=r=>localStorage.setItem(RK,JSON.stringify(r));
const getDev=()=>{try{return JSON.parse(localStorage.getItem(DK)||'{}')}catch{return{}}};
const saveDev=d=>localStorage.setItem(DK,JSON.stringify(d));

function fp(){
  const s=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,screen.colorDepth,navigator.hardwareConcurrency||''].join('|');
  let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return Math.abs(h).toString(36);
}
const FP=fp();

let cls=null;
function today(){return new Date().toISOString().slice(0,10)}

function parseURL(){
  const p=new URLSearchParams(location.search);
  const id=p.get('c');
  if(!id)return;
  cls={id,name:decodeURIComponent(p.get('n')||'授業'),date:p.get('d')||today(),start:decodeURIComponent(p.get('s')||'09:00'),end:decodeURIComponent(p.get('e')||'10:30')};
  document.getElementById('disp-name').textContent=cls.name;
  document.getElementById('disp-time').textContent=cls.date+' '+cls.start+'〜'+cls.end;
}

function judge(s,e){
  const now=new Date();
  const[sh,sm]=s.split(':').map(Number);
  const[eh,em]=e.split(':').map(Number);
  const st=new Date(now);st.setHours(sh,sm,0,0);
  const en=new Date(now);en.setHours(eh,em,0,0);
  const gr=new Date(st.getTime()+10*60000);
  if(now<st||now>en)return'absent';
  return now<=gr?'present':'late';
}

function show(msg,c){const el=document.getElementById('status');el.textContent=msg;el.className='status '+c;el.style.display='block'}

function submit(){
  const sid=document.getElementById('student-id').value.trim();
  if(!sid)return show('学籍番号を入力してください','s-info');
  if(!cls)return show('QRコードから正しいURLでアクセスしてください','s-info');
  const dev=getDev(),key=cls.id+'_'+FP;
  if(dev[key])return show('この端末からはすでに登録済みです','s-dup');
  const status=judge(cls.start,cls.end);
  const t=new Date().toTimeString().slice(0,5);
  if(status==='absent')return show('授業時間外のため登録できません','s-absent');
  const rec=getRec();
  rec.push({classId:cls.id,className:cls.name,date:cls.date,studentId:sid,time:t,status});
  saveRec(rec);dev[key]=t;saveDev(dev);
  document.getElementById('student-id').disabled=true;
  document.querySelector('button').disabled=true;
  show(status==='present'?'✓ 出席登録完了（'+t+'）':'⚠ 遅刻として登録されました（'+t+'）',status==='present'?'s-present':'s-late');
}

parseURL();
</script>
</body>
</html>
